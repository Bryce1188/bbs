<script>



    setTimeout(function () {
        new Vue({
            el:"#daoDuApp",
            data:{
                pageSize:10,			//每页显示多少条数据
                currentPage:1,		//当前页
                totalCount:0,		//总数据条数
                login_userId:'', //当前登录的用户id
				checkLoginStatus:false,
                postInfo:[],	//帖子信息
                chooseSelect: "SelectPost", //选择查看的模块
                leadUserInfo:{},
                gradeInfo:{},//等级信息
                plateId: '', //所选版块id
                condition:'全部',
                plateMap:{},
                userIdMap:{}
            },
            methods:{
                loadPlateMap(){
                    var that = this;
                    $.ajax({
                        type: "post",
                        url: "/leek_bbs/bbs/plate/findAll",
                        dataType:"json",
                        success: function(response) {
                            var data = response && response.data ? response.data : response;
                            if (Array.isArray(data)) {
                                data.forEach(function (item) {
                                    if (item && item.plate_name && item.id) {
                                        that.plateMap[item.plate_name] = item.id;
                                    }
                                });
                            }
                        },
                        error: function(error){
                            console.log("加载板块映射失败"+error);
                        }
                    });
                },
                ensureUserIdByName(userName){
                    var that = this;
                    if (!userName || that.userIdMap[userName]) {
                        return;
                    }
                    $.ajax({
                        type:"post",
                        url: "/leek_bbs/bbs/user/getUserInfo",
                        data:{ username:userName },
                        dataType: "json",
                        success:function (response) {
                            if (response && response.userInfo && response.userInfo.id) {
                                that.userIdMap[userName] = response.userInfo.id;
                            }
                        },
                        error: function(error){
                            console.log("加载用户ID失败"+error);
                        }
                    });
                },
                checkLogin(){
                  if (userInfo!=null){
                      this.login_userId=userInfo.id;
                      this.checkLoginStatus =true;
				  }
				},
                canDeletePost(item){
                    if (!item || !item.user_id || !this.login_userId) {
                        return false;
                    }
                    return Number(item.user_id) === Number(this.login_userId);
                },
				deletePost(postId) {
                    var target = null;
                    for (var i = 0; i < this.postInfo.length; i++) {
                        if (Number(this.postInfo[i].id) === Number(postId)) {
                            target = this.postInfo[i];
                            break;
                        }
                    }
                    if (!this.canDeletePost(target)) {
                        layer.msg("无权限删除该帖子", {icon: 2, time: 1500});
                        return;
                    }
					let that = this;
					layer.confirm('确定删除该帖子吗？', {icon: 3, title: '提示'}, function(index){
						axios.post('/leek_bbs/stair/postsManage/deletePosts', [postId])
								.then(res => {
									let data = res.data;
									if (data.code == "500020") {
										layer.msg("删除成功", {icon: 1, time: 1000});
										that.getPostData('MyPost', 1);  // 重新加载“我的帖子”
									} else {
										layer.alert(data.msg || "删除失败", {icon: 2, time: 1500});
									}
								})
								.catch(error => {
									console.error("删除异常", error);
									layer.alert("请求异常，请稍后再试", {icon: 2, time: 1500});
								});
						layer.close(index);
					});
				},
                getGrade(total){
                    var that = this;
                    $.ajax({
                        type:"post",
                        url: "/leek_bbs/bbs/user/getGrade",
                        data:{
                            totalExperience:total,
                        },
                        dataType: "json",
                        success:function (response) {
                            //console.log(response);
                            that.gradeInfo = response;
                            //console.log(that.gradeInfo);
                        },
                        error: function(error){
                            console.log("请求失败"+error);
                        }
                    })
                },
                /*获取用户信息*/
                getUserInfo(userId,totalExperience){
                    var that = this;
                    $.ajax({
                        type:"post",
                        url: "/leek_bbs/bbs/userPost/leadUserInfo",
                        data:{
                            userId:userId
                        },
                        dataType: "json",
                        success:function (response) {
                            // console.log(response);
                            that.leadUserInfo =response;
                            // console.log(that.leadUserInfo);
                            that.getGrade(response.experience.total_experience);
                        },
                        error: function(error){
                            console.log("请求失败"+error);
                        }
                    })
                },
                // 将页码，及每页显示的条数以参数传递提交给后台
                getPostData(chooseSelect,tag){
                    var that = this;
                    if (chooseSelect === "MyPost" && !that.login_userId) {
                        layer.msg("请先登录", {icon: 2, time: 1200});
                        return;
                    }
                    if(tag!=null){
                        that.currentPage = 1;
                    }
                    $.ajax({
                        type: "post",
                        url: "/leek_bbs/bbs/userPost/findClassifyPost",
                        data:{
                            // 每页显示的条数
                            PageSize:that.pageSize,
                            // 显示第几页
                            PageCurrent:that.currentPage,
                            //查看模块
                            chooseSelect:chooseSelect,
                            //当前登录的用户id
                            userId:that.login_userId,
                        },
                        dataType:"json",
                        success: function(response) {
                            // console.log(response);
                            var list = Array.isArray(response.list) ? response.list : [];
                            if (chooseSelect === "MyPost" && that.login_userId) {
                                list = list.filter(function (item) {
                                    return item && Number(item.user_id) === Number(that.login_userId);
                                });
                            }
                            that.postInfo = list;		//将数据给postInfo
                            // console.log(that.postInfo)
                            // 将数据的长度赋值给totalCount
                            that.totalCount = (chooseSelect === "MyPost") ? list.length : response.total,	//将数据总条数赋值给totalCount
                            that.chooseSelect = chooseSelect; //将选择的查看方式重置
                            if (Array.isArray(that.postInfo)) {
                                that.postInfo.forEach(function (item) {
                                    if (item && item.post_author && item.user_id) {
                                        that.userIdMap[item.post_author] = item.user_id;
                                    }
                                    if (item && item.last_reply) {
                                        that.ensureUserIdByName(item.last_reply);
                                    }
                                });
                            }
                            //console.log(that.totalCount)
                        },
                        error: function(error){
                            console.log("请求失败"+error);
                        }
                    });
                },
                // 分页
                // 每页显示的条数
                handleSizeChange(val) {
                    // console.log("我变了")
                    /*  // 改变每页显示的条数
                      this.PageSize=val
                      // 点击每页显示的条数时，显示第一页
                      this.getData(val,1)
                      // 注意：在改变每页显示的条数时，要将页码显示到第一页
                      this.currentPage=1*/
                },
                // 显示第几页
                handleCurrentChange(val) {
                    var that = this;
                    //console.log("我也变了")
                    //console.log(val);
                    that.currentPage =val;
                    this.getPostData(that.chooseSelect);
                    /*  // 改变默认的页数
                      this.currentPage=val
                      // 切换页码时，要获取每页显示的条数
                      this.getData(this.PageSize,(val)*(this.PageSize))*/
                },
                plateUrl(item){
                    if (!item) {
                        return "javascript:;";
                    }
                    var plateId = item.plate_id || (item.plate && item.plate.id);
                    if (!plateId && item.plate && item.plate.plate_name) {
                        plateId = this.plateMap[item.plate.plate_name];
                    }
                    if (!plateId) {
                        return "javascript:;";
                    }
                    return "/leek_bbs/skipPage/model?pl_type=" + plateId;
                },
                userUrlById(userId){
                    if (!userId) {
                        return "javascript:;";
                    }
                    return "/leek_bbs/skipPage/personal?id=" + userId;
                },
                userUrlByName(userName){
                    if (!userName) {
                        return "javascript:;";
                    }
                    if (this.userIdMap[userName]) {
                        return "/leek_bbs/skipPage/personal?id=" + this.userIdMap[userName];
                    }
                    for (var i = 0; i < this.postInfo.length; i++) {
                        if (this.postInfo[i].post_author === userName && this.postInfo[i].user_id) {
                            return "/leek_bbs/skipPage/personal?id=" + this.postInfo[i].user_id;
                        }
                    }
                    if (typeof userInfo !== "undefined" && userInfo && userInfo.another_name === userName) {
                        return "/leek_bbs/skipPage/personal?id=" + userInfo.id;
                    }
                    return "javascript:;";
                },
                /*时间转换方法*/
                changePublishTime(dateTimeStamp){
                    if (!dateTimeStamp) {
                        return "-";
                    }
                    var ts = Number(dateTimeStamp);
                    if (!isNaN(ts) && ts <= 0) {
                        return "-";
                    }
                    var minute = 1000 * 60;
                    var hour = minute * 60;
                    var day = hour * 24;
                    var halfamonth = day * 15;
                    var month = day * 30;
                    var year = day * 365;
                    var now = new Date().getTime();
                    var diffValue = now - (isNaN(ts) ? new Date(dateTimeStamp).getTime() : ts);
                    //console.log(diffValue);
                    if(isNaN(diffValue) || diffValue < 0){return "-";}
                    var monthC =diffValue/month;
                    var weekC =diffValue/(7*day);
                    var dayC =diffValue/day;
                    var hourC =diffValue/hour;
                    var minC =diffValue/minute;
                    var yearC = diffValue/year;
                    if(yearC>=1){
                        result=""+ parseInt(yearC) +"年前";
                    }else if(monthC>=1){
                        result="" + parseInt(monthC) + "月前";
                    }else if(weekC>=1){
                        result="" + parseInt(weekC) + "周前";
                    }else if(dayC>=1){
                        result=""+ parseInt(dayC) +"天前";
                    }else if(hourC>=1){
                        result=""+ parseInt(hourC) +"小时前";
                    }else if(minC>=1){
                        result=""+ parseInt(minC) +"分钟前";
                    }else{
                        result="刚刚";
					}
                    return result;
                }
            },
            mounted:function () {
                this.loadPlateMap();
                this.checkLogin();
                this.getPostData(this.chooseSelect);
                if (getUrlName("my_post")) {
                    this.getPostData("MyPost",1);
                    $("#myPost").addClass('btn-bg-2');
                }

            },
            created(){
                loadingLayui();
            }
        });
    },200);
