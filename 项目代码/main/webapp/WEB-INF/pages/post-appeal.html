<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>提交申诉</title>
    <link rel="stylesheet" href="/leek_bbs/statics/layui/css/layui.css">
    <link rel="stylesheet" href="/leek_bbs/statics/css/bbs-theme.css?v=20260525e">
    <style>
        body {
            margin: 0;
            background: #f6f8fb;
            color: #0f172a;
            font-family: Inter, "Microsoft YaHei", Arial, sans-serif;
        }
        .appeal-wrap {
            width: min(860px, calc(100% - 28px));
            margin: 26px auto;
            background: #fff;
            border: 1px solid #e5e9f0;
            border-radius: 14px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, .08);
            padding: 24px;
        }
        .appeal-title {
            margin: 0 0 6px;
            font-size: 24px;
            font-weight: 800;
        }
        .appeal-subtitle {
            margin: 0 0 20px;
            color: #64748b;
            font-size: 14px;
        }
        .appeal-field {
            margin-top: 14px;
        }
        .appeal-field label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .appeal-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }
        .appeal-item {
            border: 1px solid #d8dee8;
            border-radius: 10px;
            cursor: pointer;
            padding: 10px 8px;
            text-align: center;
            transition: all .16s ease;
            user-select: none;
        }
        .appeal-item:hover {
            border-color: #111827;
            color: #111827;
        }
        .appeal-item.active {
            background: #111827;
            border-color: #111827;
            color: #fff;
            font-weight: 700;
        }
        .appeal-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }
        .appeal-actions .layui-btn {
            border-radius: 10px;
            height: 42px;
            line-height: 42px;
            min-width: 120px;
            padding: 0 20px;
        }
        .hint {
            color: #64748b;
            font-size: 13px;
            margin-top: 10px;
        }
        @media (max-width: 860px) {
            .appeal-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
<div class="appeal-wrap">
    <h1 class="appeal-title">提交申诉</h1>
    <p class="appeal-subtitle">若你认为处理结果有误，可在这里提交申诉，管理员会再次审核。</p>

    <div class="appeal-field">
        <label>申诉类型（必选）</label>
        <div class="appeal-grid" id="appealGrid">
            <div class="appeal-item" data-value="申诉-误判违规">误判违规</div>
            <div class="appeal-item" data-value="申诉-误删内容">误删内容</div>
            <div class="appeal-item" data-value="申诉-误封禁言">误封禁言</div>
            <div class="appeal-item" data-value="申诉-盗号处理">账号异常</div>
            <div class="appeal-item" data-value="申诉-证据补充">补充证据</div>
            <div class="appeal-item" data-value="申诉-内容原创">原创证明</div>
            <div class="appeal-item" data-value="申诉-沟通记录">沟通记录</div>
            <div class="appeal-item" data-value="申诉-其他">其他</div>
        </div>
    </div>

    <div class="appeal-field">
        <label for="appealContent">申诉说明（必填）</label>
        <textarea id="appealContent" class="layui-textarea" rows="7" placeholder="请填写申诉理由、时间线、补充证据等信息。"></textarea>
    </div>

    <div class="appeal-actions">
        <button id="submitAppeal" class="layui-btn">提交申诉</button>
        <button id="goReport" class="layui-btn layui-btn-primary">去举报</button>
        <button id="goBack" class="layui-btn layui-btn-primary">返回</button>
    </div>
    <div class="hint">申诉提交后会进入管理员审核队列，请耐心等待处理结果。</div>
</div>

<script src="/leek_bbs/statics/component/common_import.js"></script>
<script>
    (function () {
        var currentAppealType = "";
        var canSubmitAppeal = false;
        var params = new URLSearchParams(window.location.search);
        var pid = parseInt(params.get("pid"), 10);
        var targetType = parseInt(params.get("type"), 10);
        if (isNaN(targetType) || (targetType !== 1 && targetType !== 2)) {
            targetType = 1;
        }
        var appealType = targetType === 1 ? 11 : 12;

        function getCurrentUser() {
            try {
                var raw = localStorage.getItem("initUser");
                if (!raw) return null;
                var parsed = JSON.parse(raw);
                return parsed && parsed.userInfo ? parsed.userInfo : null;
            } catch (e) {
                return null;
            }
        }

        function toast(msg) {
            if (window.layer && layer.msg) {
                layer.msg(msg);
            } else {
                alert(msg);
            }
        }

        function checkAppealPermission(user) {
            if (!user || !user.id || isNaN(pid) || pid <= 0) {
                canSubmitAppeal = false;
                $("#submitAppeal").prop("disabled", true).addClass("layui-btn-disabled");
                return;
            }
            axios.post("/leek_bbs/bbs/postReport/canAppeal", {
                uid: user.id,
                pid: pid,
                rp_type: appealType
            }).then(function (response) {
                var data = response.data || {};
                canSubmitAppeal = data.canAppeal === true;
                if (!canSubmitAppeal) {
                    $("#submitAppeal").prop("disabled", true).addClass("layui-btn-disabled");
                    toast(data.msg || "该内容未被举报，或您不是被举报人，不能申诉");
                }
            }).catch(function () {
                canSubmitAppeal = false;
                $("#submitAppeal").prop("disabled", true).addClass("layui-btn-disabled");
                toast("申诉资格校验失败，请稍后重试");
            });
        }

        $("#appealGrid").on("click", ".appeal-item", function () {
            $("#appealGrid .appeal-item").removeClass("active");
            $(this).addClass("active");
            currentAppealType = $(this).data("value");
        });

        $("#submitAppeal").on("click", function () {
            var user = getCurrentUser();
            var content = ($("#appealContent").val() || "").trim();
            if (!user || !user.id) {
                toast("请先登录后再申诉");
                return;
            }
            if (isNaN(pid) || pid <= 0) {
                toast("缺少申诉对象，无法提交");
                return;
            }
            if (!currentAppealType) {
                toast("请选择申诉类型");
                return;
            }
            if (!content) {
                toast("请填写申诉说明");
                return;
            }
            if (!canSubmitAppeal) {
                toast("该内容未被举报，或您不是被举报人，不能申诉");
                return;
            }
            axios.post("/leek_bbs/bbs/postReport/executeReport", {
                uid: user.id,
                pid: pid,
                r_type: currentAppealType,
                r_content: content,
                rp_type: appealType
            }).then(function (response) {
                var data = response.data || {};
                if (data.code === "500020" || data.msg === "success") {
                    toast("申诉提交成功，等待管理员审核");
                    setTimeout(function () {
                        window.history.back();
                    }, 800);
                } else {
                    toast(data.msg || "提交失败，请稍后重试");
                }
            }).catch(function () {
                toast("请求异常，请稍后重试");
            });
        });

        $("#goReport").on("click", function () {
            var q = "?pid=" + (isNaN(pid) ? "" : pid) + "&type=" + targetType;
            window.location.href = "/leek_bbs/skipPage/post-report" + q;
        });

        $("#goBack").on("click", function () {
            window.history.back();
        });

        checkAppealPermission(getCurrentUser());
    })();
</script>
</body>
</html>
