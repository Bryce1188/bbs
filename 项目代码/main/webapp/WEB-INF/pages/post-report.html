<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>举报内容</title>
    <link rel="stylesheet" href="/leek_bbs/statics/layui/css/layui.css">
    <link rel="stylesheet" href="/leek_bbs/statics/css/bbs-theme.css?v=20260526i">
    <style>
        body {
            margin: 0;
            background: #f6f8fb;
            color: #0f172a;
            font-family: Inter, "Microsoft YaHei", Arial, sans-serif;
        }
        .report-wrap {
            width: min(860px, calc(100% - 28px));
            margin: 26px auto;
            background: #fff;
            border: 1px solid #e5e9f0;
            border-radius: 14px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, .08);
            padding: 24px;
        }
        .report-title {
            margin: 0 0 6px;
            font-size: 24px;
            font-weight: 800;
        }
        .report-subtitle {
            margin: 0 0 20px;
            color: #64748b;
            font-size: 14px;
        }
        .reason-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }
        .reason-item {
            border: 1px solid #d8dee8;
            border-radius: 10px;
            cursor: pointer;
            padding: 10px 8px;
            text-align: center;
            transition: all .16s ease;
            user-select: none;
        }
        .reason-item:hover {
            border-color: #111827;
            color: #111827;
        }
        .reason-item.active {
            background: #111827;
            border-color: #111827;
            color: #fff;
            font-weight: 700;
        }
        .report-field {
            margin-top: 18px;
        }
        .report-field label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .report-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }
        .report-actions .layui-btn {
            border-radius: 10px;
            height: 42px;
            line-height: 42px;
            min-width: 120px;
            padding: 0 20px;
        }
        .hint {
            color: #64748b;
            font-size: 13px;
            margin-top: 10px;
        }
        @media (max-width: 860px) {
            .reason-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
<div class="report-wrap">
    <h1 class="report-title">举报内容</h1>
    <p class="report-subtitle">请选择举报原因并补充说明，提交后将交给管理员审核。</p>

    <div class="report-field">
        <label>举报原因（必选）</label>
        <div class="reason-grid" id="reasonGrid">
            <div class="reason-item" data-value="内容涉黄">内容涉黄</div>
            <div class="reason-item" data-value="政治相关">政治相关</div>
            <div class="reason-item" data-value="内容抄袭">内容抄袭</div>
            <div class="reason-item" data-value="涉嫌广告">涉嫌广告</div>
            <div class="reason-item" data-value="内容侵权">内容侵权</div>
            <div class="reason-item" data-value="侮辱谩骂">侮辱谩骂</div>
            <div class="reason-item" data-value="样式问题">样式问题</div>
            <div class="reason-item" data-value="其他">其他</div>
        </div>
    </div>

    <div class="report-field">
        <label for="reportContent">补充说明（选填）</label>
        <textarea id="reportContent" class="layui-textarea" rows="6" placeholder="例如：具体在哪一段内容、哪句话有问题。"></textarea>
    </div>

    <div class="report-actions">
        <button id="submitReport" class="layui-btn">提交举报</button>
        <button id="goBack" class="layui-btn layui-btn-primary">返回</button>
    </div>
    <div class="hint">举报记录会进入后台“举报管理”列表，由管理员审核处理。</div>
</div>

<script src="/leek_bbs/statics/component/common_import.js"></script>
<script>
    (function () {
        var currentReason = "";
        var params = new URLSearchParams(window.location.search);
        var pid = parseInt(params.get("pid"), 10);
        var targetType = parseInt(params.get("type"), 10);
        if (isNaN(targetType) || (targetType !== 1 && targetType !== 2)) {
            targetType = 1;
        }

        function getCurrentUser() {
            try {
                var raw = localStorage.getItem("initUser");
                if (!raw) return null;
                var parsed = JSON.parse(raw);
                return parsed && parsed.userInfo ? parsed.userInfo : null;
            } catch (e) {
                return null;
            }
        }

        function toast(msg) {
            if (window.layer && layer.msg) {
                layer.msg(msg);
            } else {
                alert(msg);
            }
        }

        $("#reasonGrid").on("click", ".reason-item", function () {
            $("#reasonGrid .reason-item").removeClass("active");
            $(this).addClass("active");
            currentReason = $(this).data("value");
        });

        $("#submitReport").on("click", function () {
            var user = getCurrentUser();
            if (!user || !user.id) {
                toast("请先登录后再举报");
                return;
            }
            if (isNaN(pid) || pid <= 0) {
                toast("缺少举报对象，无法提交");
                return;
            }
            if (!currentReason) {
                toast("请先选择举报原因");
                return;
            }
            var content = $("#reportContent").val();
            axios.post("/leek_bbs/bbs/postReport/executeReport", {
                uid: user.id,
                pid: pid,
                r_type: currentReason,
                r_content: content,
                rp_type: targetType
            }).then(function (response) {
                var data = response.data || {};
                if (data.code === "500020" || data.msg === "success") {
                    toast("举报提交成功，等待管理员审核");
                    setTimeout(function () {
                        window.history.back();
                    }, 800);
                } else {
                    toast(data.msg || "提交失败，请稍后重试");
                }
            }).catch(function () {
                toast("请求异常，请稍后重试");
            });
        });

        $("#goBack").on("click", function () {
            window.history.back();
        });
    })();
</script>
</body>
</html>
